[build]
# Default Android target for `dx build` / `cargo build` without --target.
# Override per-session with --target or CARGO_BUILD_TARGET env var.
target = "aarch64-linux-android"

# ── Local dev paths live in ~/.cargo/config.toml, not here. ──────────────────
# The CI Docker image supplies the correct NDK paths via ENV variables
# (CARGO_TARGET_*_LINKER, CC_*, AR_*) which Cargo always prefers over
# config.toml entries. Local developers should add their NDK paths to
# ~/.cargo/config.toml so they stay off-repo and machine-specific.
