name: Build Android Builder Image

# Triggers:
#   - Automatically when the Dockerfile itself changes on main
#   - Manually via workflow_dispatch when bumping tool versions
on:
  push:
    branches: [main]
    paths:
      - ".github/android-builder/Dockerfile"
  workflow_dispatch:

permissions:
  contents: read
  packages: write # push to GHCR

jobs:
  build-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/stalltagebuch-android-builder
          # Two tags:
          #   ndk27-dx0.7.9  → pinned, safe to reference in build-android.yml
          #   latest         → convenience alias, always points to newest image
          # Bump ndk27-dx0.7.9 when NDK_VERSION or DX_VERSION changes in the Dockerfile.
          tags: |
            type=raw,value=ndk27-dx0.7.9
            type=raw,value=latest

      # GitHub Actions layer cache so repeated image rebuilds are fast
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .github/android-builder
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA cache: free, persists across image rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max
